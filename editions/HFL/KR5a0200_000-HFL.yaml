front:
  text: 南斗延壽燈儀
  hash: sha256:fa2537d474977637e5e68fbe9b72571e6abb56ed1d98cbb0d59c7e6b46362cce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0200_HFL_000-001a, image: hfl/0083/0083-060.png}
body:
  text: 法事如式具位某誠惶誠恐稽首頓首焚香再拜上奏三清上聖十極髙眞中天星主紫微大帝日宫太陽帝君月府太隂皇君五星四曜星君南斗六司延壽星君北斗九皇延生星君東西中斗星君二十八宿星君普天宿度羣眞本命元辰星君三元三官大帝北極四聖眞君五師三省眞君三界四府無鞅聖衆燈壇㑹上萬聖千眞恭望聖慈洞回昭鑒臣聞天地之德莫大於生洪範之疇莫全於福爰有主司之職可伸禳祝之心仰惟三境之中南斗爲長生之府六司之内眞君持掌握之權凡彼流形歸於所宰是以按河圖之品格披靈寳之科儀嚴設星燈恭陳醮禮宜通上境延降髙眞今弟子某心假香傳誠惟物顯仰瞻南極上法斗司然寳炬之光明以昭垂像誦眞科而吟詠庶獲來臨伏願天鑒不違神心善應瓊輿羽蓋咫尺威靈金馬瑶車森羅空際延生定命克臻瑞氣之來燭幽察微丕示照臨之德恭持法信上賛神明稽首皈依虔誠讃詠臣衆等志心皈命明德宫大聖南斗天府司命上相鎭國眞君諸靈官臣聞天賦羣靈均有自然之命人懷大本咸歸皇極之中養之者福謝尤生敗之者禍因自起永惟宰制實在司存倘有祈禳宜修誠懇今辰某洗心滌慮養氣存神夙懷慕道之心仰畏在天之像謹依科式建立星壇備香花燈燭之儀歸命明德宫大聖南斗天府司命上相鎭國眞君伏願天誘其衷咸迪綿長之道物蒙其澤悉無短折之凶稽首歸依如儀讃詠南斗司命上相髙眞包羅萬象鎭國威靈爲天之府左右帝臣羣仙受令萬氣來生金闕上宰玉清尊神玄元妙道敢有不遵萬神安鎭衞護帝庭臣衆等志心皈命洞文宫大聖南斗天相司錄上相鎭嶽眞君諸靈官臣聞太極之初道無常體我生之後物有定名災祥在德而貴賤罔差吉凶在人而賢愚靡間眷兹主者付之自然倘施丹懇之誠必獲洪休之報今辰某專心正意向道修眞仰惟成象之著明虔仗上天之助順謹依科式建立星壇備香花燈燭之儀歸命洞文宫大聖南斗司録上相鎭嶽眞君伏願恢弘上道黙收紏察之威普濟羣生式序修爲之善稽首歸依虔誠讃詠南斗司録天相尊神定生注禄保命延生嶽神受命緫監衆靈赫然妙道蕩滌妖氛蠲除惡障保衞身形羣仙歸仰衆妙咸明造化自然飛昇上清臣衆等志心皈命柔德宫大聖南斗天梁延壽保命眞君諸靈官臣聞長生乆視乃大道之體常祝壽延生實庶民之所欲在天則常存而不易在人則命逺而不傷欲其壽延莫先所禱將叩靈司之祝宜修庶物之誠今某專意致明仰天觀象冀神眞之降鑒祈壽考之増崇謹依科式建立星壇備香花燈燭之儀歸命柔德宫大聖南斗天梁延夀保命眞君伏願誕佈至仁咸迪綿長之慶鋪張生德永無夭閼之虞稽首歸依虔誠讃詠南斗延壽爲天之梁普度萬𩔖咸其浸昌夀考惟棋億載無疆永保天命以除不祥生生不滅如陵如岡仁愛普施箕翼重光與神合德亘古綿長臣衆等志心皈命保光宫大聖南斗天同益算保生眞君諸靈官臣聞數分而多寡殊多則爲美命降而長短辨長乃其祥惟方寸之不欺庶年齡之可益上眞所掌精意是求今某欲増耆艾之年欽若昭回之像交於恍惚應以形聲謹依科式建立星壇備香花燈燭之儀歸命保光宫大聖南斗天同益算保生眞君伏願大慈下際長如春日之生遐算巨増盛若嵩山之固稽首歸依虔誠讃詠南斗益算與天爲同髙明悠久生德無窮保兹元命使不失中壽考且寧永契眞風至數流衍福祿來崇億萬斯年以衞我躬爲二十洞淸上境命駕雲龍臣衆等志心皈命天節宫大聖南斗天樞度厄文昌煉䰟眞君諸靈官臣聞二氣宻移亦有盛衰之理五行迭運曽無消息之機念彼勞生豈無厄㑹眞聖旣司於救度黔黎宜竭於忱恂今某恐懼以𩛙躬敬信而瞻像誓歸依於大道願受度於神休謹依科式建立壇場備香花燈燭之儀歸命天節宫大聖南斗天樞度厄文昌煉䰟眞君伏願常善救人庶潜消於災咎永懷濟世示隂騭以休祥稽首歸依虔誠讃詠南斗度厄爲天之樞靜以運化品彚榮枯文昌炳煥以府圖書轉禍爲福作我丹車煉𩲸守神護䰟保軀天光泰定災厄掃除道炁長存聖眞與居臣衆等志心皈命大聖宫南斗天機上生監簿大理眞君諸靈官臣聞眞仙作德恥一物而不知聖道應時爲羣心之妙用降衷立命受氣賦形眷掌握於生成敢恭虔而請禱今某齋心向道精意瞻爲二十一天仰思長育之恩敢僣祈禳之禮謹依科式建立星壇備香花燈燭之儀志心皈命大聖宫南斗天機上生監簿大理眞君伏願體乾坤之生德以運化權使性命之委和咸歸有道稽首歸依虔誠讃詠南斗上生爲天之梁斡運造化出入應時職在文籍鬼神莫窺大虚寥廓大理之司自根自本委順無虧萬劫長存久視不移普天司命上昇太微南斗延夀燈儀
