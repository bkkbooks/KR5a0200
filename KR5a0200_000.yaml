front:
  text: 南斗延壽燈儀
  hash: sha256:fa2537d474977637e5e68fbe9b72571e6abb56ed1d98cbb0d59c7e6b46362cce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0200_HFL_000-001a, image: hfl/0083/0083-060.png}
body:
  text: 法事如式具位某誠惶誠恐稽首頓首焚香再拜上奏三清上聖十極髙真中天星主紫微大帝日宫太陽帝君月府太隂皇君五星四曜星君南斗六司延壽星君北斗九皇延生星君東西中斗星君二十八宿星君普天宿度羣真本命元辰星君三元三官大帝北極四聖真君五師三省真君三界四府無鞅聖衆燈壇會上萬聖千真恭望聖慈洞回昭鑒臣聞天地之德莫大於生洪範之疇莫全於福爰有主司之職可伸禳祝之心仰惟三境之中南斗為長生之府六司之內真君持掌握之權凡彼流形歸於所宰是以按河圖之品格披靈寶之科儀嚴設星燈恭陳醮禮宜通上境延降髙真今弟子某心假香傳誠惟物顯仰瞻南極上法斗司然寶炬之光明以昭垂像誦真科而吟詠庶獲來臨伏願天鑒不違神心善應瓊輿羽蓋咫尺威靈金馬瑶車森羅空際延生定命克臻瑞氣之來燭幽察微丕示照臨之德恭持法信上贊神明稽首皈依虔誠讃詠臣衆等志心皈命明德宫大聖南斗天府司命上相鎮國真君諸靈官臣聞天賦羣靈均有自然之命人懷大本咸歸皇極之中養之者福謝尤生敗之者禍因自起永惟宰制實在司存倘有祈禳宜修誠懇今辰某洗心滌慮養氣存神夙懷慕道之心仰畏在天之像謹依科式建立星壇備香花燈燭之儀歸命明德宫大聖南斗天府司命上相鎮國真君伏願天誘其衷咸迪綿長之道物蒙其澤悉無短折之凶稽首歸依如儀讃詠南斗司命上相髙真包羅萬象鎮國威靈為天之府左右帝臣羣仙受令萬氣來生金闕上宰玉清尊神玄元妙道敢有不遵萬神安鎮衛護帝庭臣衆等志心皈命洞文宫大聖南斗天相司録上相鎮嶽真君諸靈官臣聞太極之初道無常體我生之後物有定名災祥在德而貴賤罔差吉凶在人而賢愚靡間眷兹主者付之自然倘施丹懇之誠必獲洪休之報今辰某專心正意向道修真仰惟成象之著明虔仗上天之助順謹依科式建立星壇備香花燈燭之儀歸命洞文宫大聖南斗司録上相鎮嶽真君伏願恢弘上道默收紏察之威普濟羣生式序修為之善稽首歸依虔誠讃詠南斗司録天相尊神定生注祿保命延生嶽神受命總監衆靈赫然妙道蕩滌妖氛蠲除惡障保衛身形羣仙歸仰衆妙咸明造化自然飛升上清臣衆等志心皈命柔德宫大聖南斗天梁延壽保命真君諸靈官臣聞長生久視乃大道之體常祝壽延生實庶民之所欲在天則常存而不易在人則命逺而不傷欲其壽延莫先所禱將叩靈司之祝宜修庶物之誠今某專意致明仰天觀象冀神真之降鑒祈壽考之增崇謹依科式建立星壇備香花燈燭之儀歸命柔德宫大聖南斗天梁延夀保命真君伏願誕布至仁咸迪綿長之慶鋪張生德永無夭閼之虞稽首歸依虔誠讃詠南斗延壽為天之梁普度萬類咸其浸昌夀考惟棋億載無疆永保天命以除不祥生生不滅如陵如岡仁愛普施箕翼重光與神合德亘古綿長臣衆等志心皈命保光宫大聖南斗天同益算保生真君諸靈官臣聞數分而多寡殊多則為美命降而長短辨長乃其祥惟方寸之不欺庶年齡之可益上真所掌精意是求今某欲增耆艾之年欽若昭回之像交於恍惚應以形聲謹依科式建立星壇備香花燈燭之儀歸命保光宫大聖南斗天同益算保生真君伏願大慈下際長如春日之生遐算巨增盛若嵩山之固稽首歸依虔誠讃詠南斗益算與天為同髙明悠久生德無窮保兹元命使不失中壽考且寧永契真風至數流衍福祿來崇億萬斯年以衛我躬為二十洞淸上境命駕雲龍臣衆等志心皈命天節宫大聖南斗天樞度厄文昌煉魂真君諸靈官臣聞二氣密移亦有盛衰之理五行迭運曽無消息之機念彼勞生豈無厄會真聖既司於救度黔黎宜竭於忱恂今某恐懼以𩛙躬敬信而瞻像誓歸依於大道願受度於神休謹依科式建立壇場備香花燈燭之儀歸命天節宫大聖南斗天樞度厄文昌煉魂真君伏願常善救人庶潛消於災咎永懷濟世示隂騭以休祥稽首歸依虔誠讃詠南斗度厄為天之樞靜以運化品彚榮枯文昌炳煥以府圖書轉禍為福作我丹車煉𩲸守神護魂保軀天光泰定災厄掃除道氣長存聖真與居臣衆等志心皈命大聖宫南斗天機上生監簿大理真君諸靈官臣聞真仙作德恥一物而不知聖道應時為羣心之妙用降衷立命受氣賦形眷掌握於生成敢恭虔而請禱今某齋心向道精意瞻為二十一天仰思長育之恩敢僣祈禳之禮謹依科式建立星壇備香花燈燭之儀志心皈命大聖宫南斗天機上生監簿大理真君伏願體乾坤之生德以運化權使性命之委和咸歸有道稽首歸依虔誠讃詠南斗上生為天之梁斡運造化出入應時職在文籍鬼神莫窺大虛寥廓大理之司自根自本委順無虧萬劫長存久視不移普天司命上升太微南斗延夀燈儀
